<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - InsightFlow AI</title>
<style>
    
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        font-family: 'Segoe UI', Arial, sans-serif;
        color: white;
    }

  
    .login-container {
        background: #1e293b;
        padding: 40px 30px;
        border-radius: 15px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        width: 320px;
        text-align: center;
    }

    .login-container h2 {
        color: #38bdf8;
        margin-bottom: 25px;
        font-size: 28px;
    }

    input[type="text"], input[type="password"] {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: none;
        outline: none;
        font-size: 16px;
        background: #0f172a;
        color: white;
    }

    input::placeholder {
        color: #94a3b8;
    }

 
    button {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        border-radius: 8px;
        border: none;
        background-color: #38bdf8;
        color: black;
        font-weight: bold;
        cursor: pointer;
        font-size: 16px;
        transition: background 0.3s;
    }

    button:hover {
        background-color: #0ea5e9;
    }

  
    .error {
        color: #f87171;
        margin-bottom: 10px;
        font-size: 14px;
    }

    
    .footer {
        margin-top: 15px;
        font-size: 12px;
        color: #94a3b8;
    }
</style>
</head>
<body>

<div class="login-container">
    <h2>🚀 InsightFlow AI</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="footer">
        &copy; 2026 InsightFlow AI. All rights reserved.
    </div>
</div>

</body>
</html>
